services:
  # 主应用服务
  app:
    build: .
    container_name: wisdomindata-app
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_HOST=${DATABASE_HOST:-mysql}
      - DATABASE_PORT=${DATABASE_PORT:-3306}
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-123456}
      - DATABASE_NAME=${DATABASE_NAME:-evaluation_test_db}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-12345678}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - CHROMA_DB_PATH=${CHROMA_DB_PATH:-/app/chroma_db}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3-14b}
      - OPENROUTER_API_BASE=${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1/}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-bge-m3:latest}
      - OLLAMA_NAMING_MODEL=${OLLAMA_NAMING_MODEL:-qwen3:1.7b}
      # OpenAI API兼容配置（用于Agent功能）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://openrouter.ai/api/v1/}
    volumes:
      - app-logs:/app/logs
      - chroma-data:/app/chroma_db
      - app-data:/app/data
      - app-exports:/app/exports
      - app-db:/app/db_file
    depends_on:
      - mysql
      - neo4j
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # MySQL数据库服务
  mysql:
    image: mysql:8.0.39
    container_name: wisdomindata-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=evaluation_test_db
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # - ./docker/mysql/conf:/etc/mysql/conf.d
      # - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --skip-ssl
    networks:
      - app-network
    restart: unless-stopped

  # Neo4j图数据库服务
  neo4j:
    build:
      context: ./docker/neo4j
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
      # 增加构建超时时间以应对网络延迟
      network: host
    container_name: wisdomindata-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-12345678}
      - NEO4J_apoc_export_file_enabled=${NEO4J_APOC_EXPORT_ENABLED:-true}
      - NEO4J_apoc_import_file_enabled=${NEO4J_APOC_IMPORT_ENABLED:-true}
      - NEO4J_apoc_import_file_use__neo4j__config=${NEO4J_APOC_USE_CONFIG:-true}
      - NEO4J_dbms_security_procedures_unrestricted=${NEO4J_UNRESTRICTED_PROCEDURES:-apoc.*,gds.*}
      - NEO4J_dbms_security_procedures_allowlist=${NEO4J_ALLOWED_PROCEDURES:-apoc.*,gds.*}
      - NEO4J_dbms_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX:-1G}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE_SIZE:-512m}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    networks:
      - app-network
    restart: unless-stopped



# 网络配置
networks:
  app-network:
    driver: bridge
    name: wisdomindata-network

# 数据卷配置
volumes:
  mysql-data:
    name: wisdomindata-mysql-data
  neo4j-data:
    name: wisdomindata-neo4j-data
  neo4j-logs:
    name: wisdomindata-neo4j-logs
  neo4j-import:
    name: wisdomindata-neo4j-import
  neo4j-plugins:
    name: wisdomindata-neo4j-plugins

  chroma-data:
    name: wisdomindata-chroma-data
  app-logs:
    name: wisdomindata-app-logs
  app-data:
    name: wisdomindata-app-data
  app-exports:
    name: wisdomindata-app-exports
  app-db:
    name: wisdomindata-app-db 
